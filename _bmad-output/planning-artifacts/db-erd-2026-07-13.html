<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차장님 DB ERD — 증분 후 (2026-07-13)</title>
<style>
  :root{
    --surface-base:#FAFAF8;
    --surface-raised:#FFFFFF;
    --ink:#1A1E1D;
    --ink-muted:#5C5A54;
    --brand-petrol:#1E6E6A;
    --petrol-strong:#14514E;
    --accent-amber:#F0A339;
    --trust-green:#1E8E63;
    --hairline:rgba(0,0,0,.12);
    --grey-external:#8A867C;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --surface-base:#201F1C;
      --surface-raised:#2A2926;
      --ink:#F1EFEA;
      --ink-muted:#B9B5AC;
      --brand-petrol:#4FA39D;
      --petrol-strong:#14514E;
      --accent-amber:#F0A339;
      --trust-green:#1E8E63;
      --hairline:rgba(255,255,255,.14);
      --grey-external:#8A867C;
    }
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--surface-base);
    color:var(--ink);
    font-family:"Pretendard",-apple-system,"Segoe UI","Malgun Gothic",sans-serif;
    padding:28px 20px 60px;
    overflow-x:hidden;
  }
  .page{max-width:1320px;margin:0 auto;}
  h1{font-size:20px;margin:0 0 6px;}
  p.lede{font-size:13.5px;color:var(--ink-muted);margin:0 0 20px;line-height:1.6;}
  .diagram-shell{
    overflow-x:auto;
    overflow-y:hidden;
    background:var(--surface-base);
    border:1px solid var(--hairline);
    border-radius:14px;
    padding:8px;
  }
  svg{display:block;}
  .t-title{font-weight:700;font-size:13.5px;fill:#ffffff;}
  .t-title-dark{font-weight:700;font-size:13.5px;fill:var(--petrol-strong);}
  .t-sub{font-size:10px;fill:rgba(255,255,255,.88);}
  .t-sub-dark{font-size:10px;fill:rgba(20,81,78,.8);}
  .t-row{font-size:12px;fill:var(--ink);}
  .t-muted{font-size:12px;fill:var(--ink-muted);}
  .t-new{font-size:11.5px;fill:var(--accent-amber);font-weight:700;}
  .t-note{font-size:10px;fill:var(--ink-muted);font-style:italic;}
  .t-badge{font-size:9.5px;font-weight:700;fill:#ffffff;}
  .t-zone{font-size:15px;font-weight:800;fill:var(--brand-petrol);letter-spacing:.5px;}
  .t-legend-h{font-size:12.5px;font-weight:700;fill:var(--ink);}
  .t-legend{font-size:11px;fill:var(--ink);}
  .t-legend-muted{font-size:10.5px;fill:var(--ink-muted);}
  .t-footer{font-size:12.5px;fill:var(--ink-muted);}
  .rel-label{font-size:10px;font-weight:700;}
  .rel-label-bg{fill:var(--surface-base);opacity:.95;}
  .card-existing-header{fill:var(--brand-petrol);}
  .card-external-header{fill:var(--grey-external);}
  .card-new-header{fill:var(--accent-amber);}
  .card-junction-header{fill:var(--trust-green);}
  .card-body{fill:var(--surface-raised);}
  .card-border-existing{fill:none;stroke:var(--hairline);stroke-width:1.3;}
  .card-border-new{fill:none;stroke:var(--accent-amber);stroke-width:2.6;}
  .card-border-junction{fill:none;stroke:var(--trust-green);stroke-width:2;stroke-dasharray:7,4;}
  .card-border-external{fill:none;stroke:var(--hairline);stroke-width:1.3;stroke-dasharray:3,3;}
  .rel-solid{fill:none;stroke:var(--brand-petrol);stroke-width:1.8;}
  .rel-dashed{fill:none;stroke:var(--trust-green);stroke-width:1.8;stroke-dasharray:5,4;}
  .legend-box{fill:var(--surface-raised);stroke:var(--hairline);stroke-width:1.2;}
  .zone-box{fill:none;stroke:var(--hairline);stroke-width:1;stroke-dasharray:2,4;}
  .note-box{fill:var(--surface-raised);stroke:var(--hairline);stroke-width:1.3;stroke-dasharray:4,3;}
</style>
</head>
<body>
<div class="page">
  <h1>차장님(중고차 직거래) DB 구조 — ER 다이어그램 (증분 후, 2026-07-13)</h1>
  <p class="lede">기존 마이그레이션 0001~0010 + 이번 증분 0011~0018. 3개 영역(계정·매물 / 채팅 / AI 검색)으로 묶었고, profiles(회원)가 대부분의 관계가 모이는 허브입니다. 진한 페트롤색 = 기존 테이블, 앰버색 = 이번 증분 신규 테이블, 초록 점선 = N:N(다대다) 관계를 표현하는 연결테이블입니다.</p>
  <div class="diagram-shell">
<svg viewBox="0 0 1300 1370" width="1300" height="1370" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="mOne" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto">
    <line x1="6" y1="0" x2="6" y2="12" stroke="var(--brand-petrol)" stroke-width="1.6"/>
  </marker>
  <marker id="mMany" viewBox="0 0 14 14" refX="12" refY="7" markerWidth="13" markerHeight="13" orient="auto">
    <path d="M0,7 L13,1 M0,7 L13,7 M0,7 L13,13" fill="none" stroke="var(--brand-petrol)" stroke-width="1.4"/>
  </marker>
  <marker id="mManyG" viewBox="0 0 14 14" refX="12" refY="7" markerWidth="13" markerHeight="13" orient="auto">
    <path d="M0,7 L13,1 M0,7 L13,7 M0,7 L13,13" fill="none" stroke="var(--trust-green)" stroke-width="1.4"/>
  </marker>
</defs>

<!-- ============ LEGEND ============ -->
<rect class="legend-box" x="60" y="20" width="1180" height="150" rx="10"/>
<text x="80" y="40" class="t-legend-h">범례</text>

<!-- row1: table type swatches -->
<rect x="80" y="52" width="26" height="16" rx="3" class="card-existing-header"/>
<text x="114" y="64" class="t-legend">기존 테이블 (0001~0010)</text>

<rect x="300" y="52" width="26" height="16" rx="3" class="card-new-header"/>
<rect x="300" y="52" width="26" height="16" rx="3" fill="none" stroke="var(--accent-amber)" stroke-width="2"/>
<text x="334" y="64" class="t-legend">NEW 테이블 (0011~0018, 두꺼운 테두리)</text>

<rect x="640" y="52" width="26" height="16" rx="3" class="card-junction-header"/>
<rect x="640" y="52" width="26" height="16" rx="3" fill="none" stroke="var(--trust-green)" stroke-width="1.6" stroke-dasharray="4,3"/>
<text x="674" y="64" class="t-legend">N:N 연결테이블 (junction, 점선 테두리)</text>

<rect x="990" y="52" width="26" height="16" rx="3" class="card-external-header"/>
<text x="1024" y="64" class="t-legend">외부관리 (auth.users, Supabase)</text>

<!-- row2: symbols -->
<text x="80" y="98" class="t-legend">🔑 PK (기본키)</text>
<text x="220" y="98" class="t-legend">→ FK (외래키 · 참조 테이블은 회색으로 표시)</text>
<text x="560" y="98" class="t-legend">🧭 vector(768) = pgvector 임베딩 컬럼</text>
<text x="900" y="98" class="t-legend-muted" font-weight="700" fill="var(--accent-amber)">＋NEW</text>
<text x="945" y="98" class="t-legend">= 이번 증분에서 추가된 컬럼</text>

<!-- row3: relationship line samples -->
<line x1="80" y1="132" x2="150" y2="132" class="rel-solid" marker-start="url(#mOne)" marker-end="url(#mMany)"/>
<text x="160" y="136" class="t-legend">1:1 · 1:N (실선, 끝쪽 갈래표시=N)</text>
<line x1="480" y1="132" x2="550" y2="132" class="rel-dashed" marker-start="url(#mManyG)" marker-end="url(#mManyG)"/>
<text x="560" y="136" class="t-legend">N:N (초록 점선, 두 부모 테이블 사이의 주석선 — 실제로는 연결테이블 경유)</text>

<!-- ============ ZONE LABELS ============ -->
<text x="210" y="205" text-anchor="middle" class="t-zone">① 계정 · 매물</text>
<text x="650" y="325" text-anchor="middle" class="t-zone">② 채팅</text>
<text x="1080" y="325" text-anchor="middle" class="t-zone">③ AI 검색 (RAG)</text>
