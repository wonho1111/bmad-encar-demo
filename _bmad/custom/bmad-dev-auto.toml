# Team override for bmad-dev-auto.
# 레포에 커밋됨. 병합 규칙·위치 선정 이유는 `bmad-agent-dev.toml` 헤더 참조.
#
# 왜 이 파일이 필요한가 (2026-07-22, bmad-loop 도입):
#   bmad-dev-auto의 step-01/02/04 세 파일이 `deferred-work.md`(2026-07-15 동결)를
#   가리킨다. code-review·quick-dev와 **같은 함정**이라 같은 사실을 여기에도 주입한다.
#   특히 step-04-review.md:69는 defer 판정 항목을 그 파일에 **append 하라**고 명령한다.
#
#   위험이 앞의 둘보다 크다: bmad-dev-auto는 **무인 루프(bmad-loop)가 돌리는 스킬**이라
#   사람이 옆에서 지적할 수 없다. 2026-07-19에 사람이 붙어 있었기에 defer 4건을 되돌릴 수
#   있었지만, 무인 실행에서는 그 교정이 일어나지 않는다.
#
#   실측(2026-07-22, BMAD @next 업그레이드 후 재측정):
#     grep -rln deferred-work .claude/skills/ → 10개 파일 / 5개 스킬
#     (bmad-code-review · bmad-dev-auto · bmad-loop-setup · bmad-loop-sweep · bmad-quick-dev)
#     업그레이드 전 5개 파일에서 늘었다 — bmad-loop 계열이 새로 들어왔기 때문이다.
#
#   ⚠️ 이 사실 주입은 **1층(안내)**일 뿐이다. 2층(강제)은 `.claude/settings.json`의
#      PreToolUse 훅(`.claude/hooks/block-frozen-ledger.py`)이 동결 파일 쓰기를 실제로
#      차단한다 — 규칙은 어길 수 없는 자리에 박는다(CLAUDE.md B9).
#
#   ※ `deferred_work_file` 경로 자체를 바꾸는 방법은 **없다**(실측): bmad-dev-auto의
#     customize.toml이 노출하는 키는 activation_steps_*/persistent_facts/on_complete/
#     implementation_handoff/review_layers 뿐이고, 경로는 step-04-review.md 머리말에
#     박혀 있다. 설령 가능하더라도 tech-debt.md로 돌리면 안 된다 — bmad-loop-sweep이
#     그 파일을 `### DW-n:` 형식으로 파싱하다 "옛 형식"으로 판단하고 **파일 전체를
#     재작성**(migration-mode)할 수 있다. 1,379줄·상호참조 250개가 걸린 파일이다.

[workflow]
persistent_facts = [
  "열린 일 장부(open-items ledger)는 `docs/tech-debt.md` **하나뿐**이다(CLAUDE.md B8). 미룬 항목·이월·defer는 전부 거기에 번호(#N)를 붙여 등재한다. 등재할 때는 그 문서의 기존 형식을 따른다 — `### N. 제목 (날짜, 우선순위)` 헤딩 + 위치/무엇/실측/**트리거(재판단 시점)** 항목.",
  "`_bmad-output/implementation-artifacts/deferred-work.md`는 **2026-07-15에 동결됐다.** '왜 그렇게 결정했나'(경위)만 보관하며 열린 일을 담지 않는다. **새 항목을 절대 추가하지 않는다.** 스킬 절차(step-01/02/04)가 이 파일을 가리키더라도 따르지 않는다 — 프로젝트 규칙이 우선한다. 쓰기를 시도하면 PreToolUse 훅이 exit 2로 차단한다.",
  "defer(미룬 항목)를 등재할 때 **'언제 다시 볼지'를 반드시 함께 적는다**(CLAUDE.md B8). '이월'만 적으면 다음 작업이 대장이 아니라 상위 문서를 보고 만들어져 조용히 또 밀린다. 트리거는 조건으로 쓴다 — 예: '- **트리거:** Epic 13 착수 시', '- **트리거:** main.py lifespan에 기동 작업이 추가될 때'.",
]
