# Team override for bmad-code-review.
# 레포에 커밋됨 — 이 프로젝트의 모든 개발자·에이전트에 적용된다.
# 병합 규칙(SKILL.md Step 1): base(skill install) → team(이 파일) → user(*.user.toml).
#   스칼라는 덮어쓰기, 배열(persistent_facts 등)은 append.
#
# 왜 스킬 설치본(.claude/skills/*/customize.toml)이 아니라 여기냐:
#   설치본은 벤더 파일이라 BMAD 업그레이드가 덮어쓴다. 프로젝트 고유 설정은 여기 둔다.

[workflow]
persistent_facts = [
  # ── 열린 일 장부는 하나다 ────────────────────────────────────────────────
  #
  # 왜 이 사실을 주입하나 (실측 경위, 2026-07-19):
  #   이 스킬의 step-04-present.md는 defer 항목을
  #   `{implementation_artifacts}/deferred-work.md`에 적으라고 지시한다. 그런데 그 파일은
  #   2026-07-15에 **동결**됐다(첫 줄: "⛔ 이 파일에 새 항목을 적지 않는다").
  #   실제로 2026-07-19 코드리뷰에서 Claude가 지시를 성실히 따르다 동결 파일에 defer 4건을
  #   적었고, 사용자가 지적해 되돌렸다. 문서는 "적지 마라", 절차는 "여기 적어라"라고
  #   말하고 있었으므로 **성실할수록 어기는 구조**였다.
  #
  #   동결 이유도 경위가 있다: 장부가 2개일 때 #18(테이블 GRANT)이 한쪽은 "dev 자율",
  #   다른 쪽은 "사용자 승인 필수"로 **정반대 판정**을 들고 1일간 공존했고, 하필 Epic 9의
  #   첫 마이그레이션이 그 축을 건드리기 직전이었다.
  #
  #   ⚠️ 이 사실 주입은 **1층(안내)**일 뿐이다. 2층(강제)은 `.claude/settings.json`의
  #      PreToolUse 훅이 동결 파일 쓰기를 실제로 차단한다 — 규칙은 어길 수 없는 자리에
  #      박는다(CLAUDE.md B9). 훅이 red/green으로 검증된 근거는 그 파일 주석 참조.
  "열린 일 장부(open-items ledger)는 `docs/tech-debt.md` **하나뿐**이다(CLAUDE.md B8). 코드리뷰의 defer·이월·미룬 항목은 **전부 거기에** 번호(#N)를 붙여 등재하고, 스토리 파일의 defer 항목은 그 번호를 가리킨다.",
  "`_bmad-output/implementation-artifacts/deferred-work.md`는 **2026-07-15에 동결됐다.** 열린 일을 담지 않고 '왜 그렇게 결정했나'(경위·party-mode 근거·실측으로 뒤집힌 주장)만 보관한다. **이 파일에 새 항목을 절대 추가하지 않는다.** 스킬 절차(step-04-present.md)가 이 파일을 가리키더라도 따르지 않는다 — 그 지시는 동결 이전에 쓰인 것이고, 프로젝트 규칙이 우선한다.",

  # ── 검증 없이 선언하지 않는다 ───────────────────────────────────────────
  #
  # 왜: 2026-07-19 코드리뷰에서 3개 레이어가 모두 놓친 결함 2건이 **실제로 돌려보니** 나왔다.
  #   ① onError가 코드에 분명히 있는데 하이드레이션 전 실패에는 안 불렸다(깨진 이미지 노출)
  #   ② 사진 정리 코드가 분명히 있는데 cascade 때문에 0건을 지웠다(고아 100%)
  #   둘 다 단위 테스트 83건이 초록인 채였다. 읽어서는 안 보이고 돌려야 보이는 종류다.
  "리뷰 findings는 **분류 전에 실제로 확인한다** — 코드를 읽고, 필요하면 DB를 조회하고, 웹은 브라우저로 돌려본다. '코드에 그 처리가 있다'는 것은 '그게 동작한다'의 근거가 아니다(CLAUDE.md B4). 특히 단위 테스트 통과는 DB cascade·하이드레이션 타이밍처럼 테스트 하네스가 모사하지 않는 실패를 보증하지 못한다.",
  "리뷰어의 지적은 **주장 단위로 쪼개서 판정한다.** 한 지적 안에 틀린 부분과 맞는 부분이 섞여 있을 수 있다 — 2026-07-19에 틀린 근거(관리자 RLS)를 기각하면서 같은 지적에 있던 맞는 관찰(정리 함수가 DB 조회에 의존한다)까지 버렸고, 그것이 고아 회귀로 이어졌다.",
]
