name: Tests

# 층별 단위·통합 테스트 게이트 (기술부채 #29 해소, 2026-07-16).
#
# 왜 만들었나: 이 레포의 CI는 migration-gate.yml 하나뿐이었고 paths 필터가
# supabase/migrations/** 라, api/web/app을 건드리는 push엔 아무 검사도 안 돌았다.
# 결과: 테스트 250개가 있는데 아무도 안 돌렸다 — 만들 때 한 번 돌리고 끝.
# 실증(2026-07-16): 로컬에서 pytest를 돌리자 8개 파일이 수집 단계에서 전멸했다.
# Story 8.4가 추가한 psycopg_pool 의존성이 로컬 환경에 설치된 적이 없었던 것 —
# CI가 있었으면 8.4 시점에 바로 빨간불이 났을 일이다. 그래서 이 워크플로가 있다.
#
# ⚠️ secrets를 넣지 마라. 그게 이 게이트의 안전장치다.
#   · api/tests/test_readonly.py (2건) — DATABASE_URL이 있으면 **운영 Supabase에 실제 접속**한다.
#     없으면 자동 skip. 넣지 마라.
#   · api/tests/test_live_smoke.py (3건) — RUN_LIVE_SMOKE=1이면 **진짜 Gemini를 호출(과금)**한다.
#     켜지 마라.
#   넣는 순간 이 게이트는 결정론적 검사에서 라이브·과금·비결정 검사로 바뀐다.
#
# 이 게이트가 안 보는 것 (추측 아니라 실측):
#   · E2E — Playwright 스펙이 레포에 0개다. docs/e2e-*.md는 사람이 읽는 수동 대본이지 코드가 아니다.
#   · web은 유닛 1파일(6건)뿐 — 표준이 "E2E 우선, Vitest는 순수 유틸 예외"라 원래 그렇다(project-context 규칙 12).
#   · 마이그레이션 self-containment — migration-gate.yml 소관(경로 분리 유지).

on:
  push:
    branches: [develop, main]
    paths:
      - "api/**"
      - "web/**"
      - "app/**"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "api/**"
      - "web/**"
      - "app/**"
      - ".github/workflows/tests.yml"

jobs:
  api:
    name: api (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      # requirements.txt엔 dev extras(pytest·httpx)가 의도적으로 빠져 있다.
      # extras로 설치해야 테스트 실행에 필요한 것까지 온다 — 로컬 venv 드리프트가
      # 재발하지 않게 설치 경로를 여기 못박는다.
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[ai,dev]"
      # secrets 없음 → test_readonly(2) · test_live_smoke(3)은 자동 skip, 나머지 167건 검증.
      # tests/integration도 TEST_DATABASE_URL이 없어 skip된다 — 실행은 아래 api-db 잡의 몫.
      - run: python -m pytest -q

  api-db:
    name: api (실DB 통합 — FR11 sold 비노출)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # 왜 이 잡이 있나 (코드리뷰 2026-07-20, docs/tech-debt.md #48):
    #   Story 9.6이 FR11(판매완료 비노출) 강제를 DB(RLS)가 아니라 **api 고정쿼리의 WHERE절**로
    #   옮겼다. ai_readonly의 listing_images 정책은 using(true)라 sold 사진까지 열려 있어
    #   (0012:153, 의도된 설계) 그 WHERE절이 거르는 **유일한 지점**이다. 그런데 그걸 지키던
    #   단위테스트는 가짜 DB가 "SQL 문자열에 status='on_sale'이 있나"를 보는 구조라,
    #   `AND (l.status='on_sale' OR true)` 같은 **진짜 우회가 전부 초록**이었다(실측).
    #   문자열 검사로는 SQL 의미를 지킬 수 없다 → 진짜 Postgres에 붙는 층을 하나 둔다.
    #
    # ⚠️ 위 "secrets를 넣지 마라" 규칙을 어기지 않는다:
    #   여기 쓰는 DSN은 **이 잡이 띄우고 버리는 컨테이너**를 가리킨다(localhost). 운영 Supabase와
    #   무관하고 secrets도 쓰지 않는다. 그래서 test_readonly·test_live_smoke는 여전히 안 돈다
    #   (아래 pytest 대상이 tests/integration으로 한정돼 있다).
    #
    # 이 게이트가 안 보는 것: 운영 DB가 마이그레이션과 어긋난 경우(스키마 드리프트) —
    #   migration-gate.yml 소관이다. 그리고 paths 필터가 api/**라, 마이그레이션만 바뀐 push에는
    #   이 잡이 안 돈다(경로 분리 유지 — migration-gate.yml 주석 참조).
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      PGDSN: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      # 프렐류드(Supabase 플랫폼 계약면 재현) → 마이그레이션 전량을 번호순으로 적용한다.
      # migration-gate.yml과 같은 재료를 쓴다(scripts/migration-check-prelude.sql) — 스키마를
      # 여기 손으로 복사하면 두 벌이 되어 드리프트가 시작된다.
      - name: 마이그레이션 적용 (프렐류드 → 번호순)
        run: |
          set -euo pipefail
          psql "$PGDSN" -v ON_ERROR_STOP=1 -q -f scripts/migration-check-prelude.sql
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "▶ $f"
            psql "$PGDSN" -v ON_ERROR_STOP=1 -q -f "$f"
          done
      - name: 의존성 설치
        working-directory: api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ai,dev]"
      - name: FR11 실DB 통합 검증
        working-directory: api
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        # -p no:randomly 없음 / 단일 파일이라 순서 의존 없음.
        # 실패하면 "sold 매물의 사진이 실제로 샌다"는 뜻이다 — 무시하고 넘기지 말 것.
        run: python -m pytest tests/integration -q

  web:
    name: web (lint + vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # Next 16의 next build는 ESLint를 자동 실행하지 않는다. 그래서 lint를 여기서
      # 명시적으로 돌린다 — 실증(2026-07-18): react-hooks/refs 위반(FocusTrap 렌더 중
      # ref 쓰기)이 CI·빌드 어디에도 안 걸려 develop에 그대로 들어와 있었다.
      - run: npm run lint
      - run: npm test

  app:
    name: app (flutter test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter test
